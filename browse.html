<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="./assets/logo/CampusLoop_Black.svg">
    <title>CampusLoop: Browse</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="./assets/styles/style.css">
    <link rel="stylesheet" href="./assets/styles/browse.css">
    <script src="./assets/scripts/search.js"></script>
    <script src="./assets/scripts/loadProducts.js"></script>
</head>
<body>
    <!-- MENU -->
    <header class="navbar">
        <div class="navbar-left">
            <a href="index.html" class="logo-container">
                <img class="logo-img" src="./assets/logo/CampusLoop_Blue.svg" alt="Logo CampusLoop">
                <p class="logo-name">CampusLoop</p>
            </a>
        </div>
        <nav class="navbar-center">
            <a class="nav-link" href="index.html">HOME</a>
            <a class="nav-link active" href="browse.html">STORE</a>
            <a class="nav-link" href="contact.html">CONTACT</a>
        </nav>
        <div class="navbar-right">
            <a href="#" class="nav-icon">
                <span class="material-symbols-rounded">shopping_basket</span>
            </a>
            <a href="#" class="btn-login">Log In</a>
            <a href="#" class="btn-signup">Sign Up</a>
        </div>
    </header>

    <!-- BROWSE-->
    <main>
        <!-- SEARCH BAR -->
        <section class="search">
            <div class="search-bar">
                <span class="material-symbols-rounded">search</span>
                <input type="text" id="searchInput" placeholder="Search">
            </div>
            <div>
                <button class="btn-filter">
                    <span class="material-symbols-rounded">filter_list</span>
                </button>
            </div>
        </section>

        <!-- ITEM LIST -->
        <section>
            <div class="items-grid">
                <!-- ITEM -->
                <div class="item example" id="1">
                    <div class="state">
                        <p>New</p>
                    </div>
                    <img src="#" alt="Product image" class="p-img">
                    <h2 class="title">Title</h2>
                    <div class="price">
                        <span>₩</span>
                        <h1>Price</h1>
                    </div>
                    <div class="location">
                        <span class="material-symbols-rounded">place</span>
                        <p>Campus</p>
                    </div>
                    <button class="btn-buy">
                        <span class="material-symbols-rounded">add_shopping_cart</span>
                        <p>Add to cart</p>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <button>
        <span class="material-symbols-rounded">

        </span>
    </button>

    <!-- FOOTER -->
    <footer>
        <div class="column ownership">
            <a href="index.html">
                <img class="logo-img" src="./assets/logo/CampusLoop_Blue.svg" alt="CampusLoop logo">
                <p class="logo-name">CampusLoop</p>
            </a>
            <p>Created by Xinyao Salgado</p>
        </div>
        <div class="column platform">
            <h5>PLATFORM</h5>
            <a href="index.html">HOME</a>
            <a href="browse.html">BROWSE</a>
            <a href="sell.html">SELL</a>
            <a href="cart.html">CART</a>
        </div>
        <div class="column">
            <h5>CONNECT</h5>
            <a href="contact.html">CONTACT</a>
            <a href="#">Facebook</a>
            <a href="#">Instagram</a>
            <a href="#">LinkedIn</a>
            <a href="#">KakaoTalk</a>
        </div>
    </footer>
</body>
