<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="./assets/logo/CampusLoop_Black.svg">
    <title>Cart - CampusLoop</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="./assets/styles/style.css">
    <link rel="stylesheet" href="./assets/styles/cart.css">
</head>
<body>
    <!-- MENU -->
    <header class="navbar">
        <div class="navbar-left">
            <a href="index.html" class="logo-container">
                <img class="logo-img" src="./assets/logo/CampusLoop_Blue.svg" alt="Logo CampusLoop">
                <p class="logo-name">CampusLoop</p>
            </a>
        </div>
        <nav class="navbar-center">
            <a class="nav-link" href="index.html">HOME</a>
            <a class="nav-link" href="browse.html">STORE</a>
            <a class="nav-link" href="contact.html">CONTACT</a>
        </nav>
        <div class="navbar-right">
            <a href="#" class="nav-icon">
                <span class="material-symbols-rounded">shopping_basket</span>
                <span class="cart-badge" id="cartBadge">0</span>
            </a>
            <a href="#" class="btn-login">Log In</a>
            <a href="#" class="btn-signup">Sign Up</a>
        </div>
    </header>

    <main class="cart-container">
        <section class="checkout-sections">
            
            <div class="accordion-item active">
                <button class="accordion-header">
                    <span class="step-number">1</span>
                    <h2>Review Items</h2>
                    <span class="material-symbols-rounded toggle-icon">expand_more</span>
                </button>
                <div class="accordion-content">
                    <div id="cartItemsList" class="cart-items-list">
                        </div>
                </div>
            </div>

            <div class="accordion-item">
                <button class="accordion-header">
                    <span class="step-number">2</span>
                    <h2>Billing Information</h2>
                    <span class="material-symbols-rounded toggle-icon">expand_more</span>
                </button>
                <div class="accordion-content">
                    <form class="checkout-form" id="billingForm" onsubmit="event.preventDefault();">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="firstName">First Name</label>
                                <input type="text" id="firstName" placeholder="John" required>
                            </div>
                            <div class="form-group">
                                <label for="lastName">Last Name</label>
                                <input type="text" id="lastName" placeholder="Doe" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group flex-1">
                                <label for="country">Country</label>
                                <input type="text" id="country" placeholder="e.g., South Korea" required>
                            </div>
                            <div class="form-group flex-1">
                                <label for="province">Province / City</label>
                                <input type="text" id="province" placeholder="e.g., Seoul / Gyeonggi-do" required>
                            </div>
                            <div class="form-group flex-1">
                                <label for="city">District / Town</label>
                                <input type="text" id="city" placeholder="e.g., Seodaemun-gu / Mapo-gu" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="address">Address</label>
                            <input type="text" id="address" placeholder="Room 302, Anam-dong / Yonsei Road 50" required>
                        </div>
                        <div class="form-group">
                            <label for="zipCode">Postal Code</label>
                            <input type="text" id="zipCode" placeholder="03722" required>
                        </div>
                    </form>
                </div>
            </div>

            <div class="accordion-item">
                <button class="accordion-header">
                    <span class="step-number">3</span>
                    <h2>Payment Method</h2>
                    <span class="material-symbols-rounded toggle-icon">expand_more</span>
                </button>
                <div class="accordion-content">
                    <form class="checkout-form" id="paymentForm" onsubmit="event.preventDefault();">
                        <div class="form-group">
                            <label for="cardName">Cardholder Name</label>
                            <input type="text" id="cardName" placeholder="JOHN DOE" required>
                        </div>
                        <div class="form-group">
                            <label for="cardNumber">Card Number</label>
                            <input type="text" id="cardNumber" placeholder="4532 •••• •••• ••••" maxlength="19" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="cardExpiry">Expiration Date</label>
                                <input type="text" id="cardExpiry" placeholder="MM/YY" maxlength="5" required>
                            </div>
                            <div class="form-group">
                                <label for="cardCvv">CVV</label>
                                <input type="password" id="cardCvv" placeholder="•••" maxlength="3" required>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

        </section>

        <section class="cart-summary">
            <h3>Order Summary</h3>
            <div class="summary-details">
                <div class="summary-row">
                    <p>Subtotal</p>
                    <span id="summarySubtotal">₩0</span>
                </div>
                <div class="summary-row">
                    <p>Taxes (VAT 10%)</p>
                    <span id="summaryTaxes">₩0</span>
                </div>
                <div class="summary-row">
                    <p>Service Fee</p>
                    <span id="summaryFee">₩2,000</span>
                </div>
                <hr>
                <div class="summary-row total-row">
                    <p>Total</p>
                    <span id="summaryTotal">₩0</span>
                </div>
            </div>
            <button id="btnPlaceOrder" class="btn-checkout" disabled>Place Order</button>
        </section>
    </main>

    <!-- FOOTER -->
    <footer>
        <div class="column ownership">
            <a href="index.html">
                <img class="logo-img" src="./assets/logo/CampusLoop_Blue.svg" alt="CampusLoop logo">
                <p class="logo-name">CampusLoop</p>
            </a>
            <p>Created by Xinyao Salgado</p>
        </div>
        <div class="column platform">
            <h5>PLATFORM</h5>
            <a href="index.html">HOME</a>
            <a href="browse.html">BROWSE</a>
            <a href="sell.html">SELL</a>
            <a href="cart.html">CART</a>
        </div>
        <div class="column">
            <h5>CONNECT</h5>
            <a href="contact.html">CONTACT</a>
            <a href="#">Facebook</a>
            <a href="#">Instagram</a>
            <a href="#">LinkedIn</a>
            <a href="#">KakaoTalk</a>
        </div>
    </footer>
    <script src="./assets/scripts/cart.js"></script>
</body>
</html>
